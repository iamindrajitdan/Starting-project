name: test-project
on: push
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3  
            - name: Installing node
              uses: actions/setup-node@v3
              with:
                node-version: '18'
            - name: Installing dependencies
              run: npm ci
            - name: Running tests
              run: npm test